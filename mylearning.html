<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Learning - E Learning</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="navbar">
        <h2 class="logo">E Learning</h2>
        <input type="text" placeholder="Search for anything" class="search">
        <div class="user-menu">
            <a href="mylearning.html" class="my-learning">My learning</a>
            <div class="nav-icons">
                <!-- Heart / Likes -->
                <a href="wishlist.html" style="color: inherit;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"></path></svg></a>
                <!-- Notifications -->
                <a href="notification.html" style="color: inherit;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></a>
            </div>
            <div class="profile-wrapper">
                <div class="avatar" id="avatarBtn">NS</div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-header">
                        <div class="avatar-lg">NS</div>
                        <div class="profile-header-info">
                            <strong>NS User</strong>
                            <p>ns@example.com</p>
                        </div>
                    </div>
                    <div class="dropdown-section">
                        <a href="dashboard.html" class="dropdown-item">Dashboard</a>
                        <a href="mylearning.html" class="dropdown-item">My learning</a>
                        <a href="wishlist.html" class="dropdown-item">Wishlist</a>
                        <a href="notification.html" class="dropdown-item">Notifications</a>
                    </div>
                    <div class="dropdown-section">
                        <a href="login.html" class="dropdown-item logout">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="mylearning-container">
        <div class="mylearning-header">
            <h1>Courses</h1>
            <div class="mylearning-tabs">
                <div class="mylearning-tab active">Courses</div>
            </div>
        </div>

        <div class="mylearning-controls">
            <div class="controls-left">
                <div class="search-container">
                    <input type="text" placeholder="Search your courses">
                    <button class="search-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                </div>
                <button class="dropdown-btn">
                    Newest
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"></path></svg>
                </button>
            </div>
            <button class="new-course-btn">New course</button>
        </div>

        <div class="course-list">
            <div class="course-progress-card">
                <div class="course-img-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    <span>Course Assets</span>
                </div>
                <div class="course-info">
                    <h3>Python developer</h3>
                    <div class="course-status">DRAFT Public</div>
                </div>
                <div class="progress-section">
                    <div class="progress-label">Finish your course</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Profile dropdown toggle
        const avatarBtn = document.getElementById('avatarBtn');
        const profileDropdown = document.getElementById('profileDropdown');

        avatarBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            profileDropdown.classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            if (!profileDropdown.contains(e.target) && e.target !== avatarBtn) {
                profileDropdown.classList.remove('open');
            }
        });
    </script>
</body>

</html>
