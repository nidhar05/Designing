<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - E Learning</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dark-theme">
    <header class="navbar">
        <h2 class="logo"><a href="dashboard.html" style="color: inherit; text-decoration: none;">E Learning</a></h2>
        <input type="text" placeholder="Search for anything" class="search">
        <div class="user-menu">
            <a href="mylearning.html" class="my-learning">My learning</a>
            <div class="nav-icons">
                <!-- Heart / Likes -->
                <a href="wishlist.html" style="color: inherit;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"></path></svg></a>
                <!-- Notifications -->
                <a href="notification.html" style="color: inherit;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></a>
            </div>
            <!-- Avatar with dropdown -->
            <div class="profile-wrapper">
                <div class="avatar" id="avatarBtn">NS</div>
                <div class="profile-dropdown" id="profileDropdown">
                    <!-- User info -->
                    <div class="profile-header">
                        <div class="avatar-lg">NS</div>
                        <div class="profile-header-info">
                            <strong>NS User</strong>
                            <p>ns@example.com</p>
                        </div>
                    </div>
                    <!-- Menu items -->
                    <div class="dropdown-section">
                        <a href="dashboard.html" class="dropdown-item">Dashboard</a>
                        <a href="mylearning.html" class="dropdown-item">My learning</a>
                        <a href="wishlist.html" class="dropdown-item">Wishlist</a>
                        <a href="notification.html" class="dropdown-item">Notifications</a>
                    </div>
                    <div class="dropdown-section">
                        <a href="login.html" class="dropdown-item logout">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="wishlist-container">
        <header class="wishlist-header">
            <h1>My Wishlist</h1>
        </header>

        <div class="wishlist-grid">
            <!-- Wishlist Item 1 -->
            <div class="wishlist-card"
                onclick="openVideoModal('Python developer', 'https://www.w3schools.com/html/mov_bbb.mp4')">
                <div class="wishlist-thumbnail">
                    <img src="https://picsum.photos/seed/wish1/400/225" alt="Python developer">
                    <div class="play-overlay">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"></path>
                        </svg>
                    </div>
                </div>
                <div class="wishlist-info">
                    <h3>Python developer</h3>
                    <p>Author: Jane Doe</p>
                    <div class="wishlist-meta">
                        <span class="rating">⭐ 4.8</span>
                        <span class="price">₹549</span>
                    </div>
                </div>
            </div>

            <!-- Wishlist Item 2 -->
            <div class="wishlist-card"
                onclick="openVideoModal('React Masterclass', 'https://www.w3schools.com/html/movie.mp4')">
                <div class="wishlist-thumbnail">
                    <img src="https://picsum.photos/seed/wish2/400/225" alt="React Masterclass">
                    <div class="play-overlay">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"></path>
                        </svg>
                    </div>
                </div>
                <div class="wishlist-info">
                    <h3>React Masterclass</h3>
                    <p>Author: Alex Smith</p>
                    <div class="wishlist-meta">
                        <span class="rating">⭐ 4.9</span>
                        <span class="price">₹699</span>
                    </div>
                </div>
            </div>

            <!-- Wishlist Item 3 -->
            <div class="wishlist-card"
                onclick="openVideoModal('UI/UX Design', 'https://www.w3schools.com/html/mov_bbb.mp4')">
                <div class="wishlist-thumbnail">
                    <img src="https://picsum.photos/seed/wish3/400/225" alt="UI/UX Design">
                    <div class="play-overlay">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"></path>
                        </svg>
                    </div>
                </div>
                <div class="wishlist-info">
                    <h3>UI/UX Design</h3>
                    <p>Author: Emily T.</p>
                    <div class="wishlist-meta">
                        <span class="rating">⭐ 4.7</span>
                        <span class="price">₹449</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Video Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeVideoModal()">&times;</span>
            <h2 id="modalTitle">Course Preview</h2>
            <div class="video-container">
                <video id="courseVideo" controls>
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>

    <script>
        // Profile dropdown toggle
        const avatarBtn = document.getElementById('avatarBtn');
        const profileDropdown = document.getElementById('profileDropdown');

        avatarBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('open');
        });

        // Close dropdown when clicking elsewhere
        document.addEventListener('click', (e) => {
            if (!profileDropdown.contains(e.target) && e.target !== avatarBtn) {
                profileDropdown.classList.remove('open');
            }
        });

        function openVideoModal(title, videoSrc) {
            document.getElementById('modalTitle').innerText = title;
            const video = document.getElementById('courseVideo');
            video.src = videoSrc;
            document.getElementById('videoModal').style.display = 'flex';
            video.play();
        }

        function closeVideoModal() {
            const video = document.getElementById('courseVideo');
            video.pause();
            video.src = "";
            document.getElementById('videoModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('videoModal');
            if (event.target == modal) {
                closeVideoModal();
            }
        }
    </script>
</body>

</html>
